<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Open book icon -->
  <g transform="translate(256,240)" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M0 -60 L0 100 C-30 80 -90 75 -120 85 L-120 -35 C-90 -45 -30 -40 0 -60Z" fill="rgba(255,255,255,0.15)"/>
    <!-- Right page -->
    <path d="M0 -60 L0 100 C30 80 90 75 120 85 L120 -35 C90 -45 30 -40 0 -60Z" fill="rgba(255,255,255,0.15)"/>
    <!-- Spine line -->
    <line x1="0" y1="-60" x2="0" y2="100" stroke="white" stroke-width="3"/>
    <!-- Left page lines -->
    <line x1="-90" y1="0" x2="-30" y2="-10" stroke="rgba(255,255,255,0.5)" stroke-width="8"/>
    <line x1="-90" y1="30" x2="-30" y2="20" stroke="rgba(255,255,255,0.5)" stroke-width="8"/>
    <line x1="-90" y1="60" x2="-30" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="8"/>
    <!-- Right page lines -->
    <line x1="90" y1="0" x2="30" y2="-10" stroke="rgba(255,255,255,0.5)" stroke-width="8"/>
    <line x1="90" y1="30" x2="30" y2="20" stroke="rgba(255,255,255,0.5)" stroke-width="8"/>
    <line x1="90" y1="60" x2="30" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="8"/>
  </g>
  <!-- Graduation cap on top -->
  <g transform="translate(256,130)" fill="white">
    <polygon points="0,-40 80,0 0,20 -80,0" fill="white" opacity="0.95"/>
    <rect x="-3" y="0" width="6" height="40" fill="white" opacity="0.7"/>
    <circle cx="0" cy="42" r="8" fill="white" opacity="0.7"/>
  </g>
</svg>
